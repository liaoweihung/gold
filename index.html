<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>若雲的黃金小金庫</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f9f9f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .dashboard { 
            background: white; 
            border-radius: 15px; 
            padding: 40px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #d4af37; margin-bottom: 30px; }
        .data-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 15px 0; 
            font-size: 1.2em; 
            color: #555;
        }
        .total-value { 
            font-size: 2.5em; 
            font-weight: bold; 
            color: #e74c3c; 
            margin-top: 20px; 
            border-top: 2px dashed #eee; 
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>✨ 若雲的黃金小金庫</h1>
        
        <div class="data-row">
            <span>目前牌價 (TWD/克)：</span>
            <span id="price">載入中...</span>
        </div>
        
        <div class="data-row">
            <span>累積黃金重量：</span>
            <span><span id="grams">0</span> 克</span>
        </div>
        
        <div class="total-value">
            NT$ <span id="total">0</span>
        </div>
    </div>

    <script>
        // 這裡設定若雲目前擁有的黃金克數
        const currentGrams = 15.5; 
        
        // 模擬獲取黃金價格的函數
        async function updateDashboard() {
            try {
                // 【注意】這裡目前用假資料模擬。
                // 未來你可以將這裡替換成呼叫你自己寫的 Google Apps Script API 網址
                // const response = await fetch('你的_GAS_API_URL');
                // const data = await response.json();
                // const currentPrice = data.price;
                
                const currentPrice = 2750; // 假設台銀目前賣出價為 2750 元/克
                
                // 計算總值並更新畫面
                const totalValue = Math.floor(currentPrice * currentGrams);
                
                document.getElementById('price').textContent = currentPrice.toLocaleString();
                document.getElementById('grams').textContent = currentGrams;
                document.getElementById('total').textContent = totalValue.toLocaleString();
                
            } catch (error) {
                console.error('獲取報價失敗:', error);
                document.getElementById('price').textContent = '無法取得';
            }
        }

        // 網頁載入時執行一次
        updateDashboard();
    </script>
</body>
</html>
