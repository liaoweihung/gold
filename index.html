<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>若雲的黃金小金庫</title>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #f9f9f9; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .dashboard { 
            background: white; 
            border-radius: 15px; 
            padding: 40px; 
            box-shadow: 0 10px 20px rgba(0,0,0,0.1); 
            text-align: center; 
            max-width: 400px;
            width: 100%;
        }
        h1 { color: #d4af37; margin-bottom: 30px; }
        .data-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 15px 0; 
            font-size: 1.2em; 
            color: #555;
        }
        .total-value { 
            font-size: 2.5em; 
            font-weight: bold; 
            color: #e74c3c; 
            margin-top: 20px; 
            border-top: 2px dashed #eee; 
            padding-top: 20px;
        }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>✨ 若雲的黃金小金庫</h1>
        
        <div class="data-row">
            <span>目前牌價 (TWD/克)：</span>
            <span id="price">載入中...</span>
        </div>
        
        <div class="data-row">
            <span>累積黃金重量：</span>
            <span><span id="grams">0</span> 克</span>
        </div>
        
        <div class="total-value">
            NT$ <span id="total">0</span>
        </div>
    </div>

    <script>
  // 【請替換】換成你在 GAS 的網址
const gasApiUrl = 'https://script.google.com/macros/s/AKfycbzicB5gW0aFVQHvMlI1nQ9bUOMQnA6DqSZSm6343I7kdyGf3GTIGcAuaUIt5k2OlMNX_A/exec'; 

async function updateDashboard() {
    try {
        const response = await fetch(gasApiUrl, { redirect: "follow" });
        const data = await response.json();
        
        if(data.success) {
            const currentPrice = data.buyPrice; 
            
            // 【關鍵修改】不再使用寫死的數字，直接讀取 API 傳來的真實克數
            const currentGrams = data.totalGrams;
            
            const totalValue = Math.floor(currentPrice * currentGrams);
            
            document.getElementById('price').textContent = currentPrice.toLocaleString();
            
            // toFixed(2) 可以讓克數漂亮地顯示到小數點後兩位
            document.getElementById('grams').textContent = currentGrams.toFixed(2); 
            document.getElementById('total').textContent = totalValue.toLocaleString();
        } else {
            document.getElementById('price').textContent = '資料解析失敗';
        }
        
    } catch (error) {
        console.error('獲取報價失敗:', error);
        document.getElementById('price').textContent = '無法連線';
    }
}

updateDashboard();
            
    </script>
</body>
</html>
